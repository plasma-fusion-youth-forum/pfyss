- name: 仲田 資季
  englishName: Motoki Nakata
  position: 教授
  affiliation: 駒沢大学
  image: https://lh3.googleusercontent.com/pw/AP1GczP1XZjEHhgWtNVredVBxpvfLIywXpHT8iUs3J8dz2rwSyFkLCerK34-_OuDM6UEN0XOyQTYlv38ksD9RT8nYaL1lnw7i3V61QV9ci-IQEhnzvBXAHc=w2400
  description: |
    駒澤大学 総合教育研究部 自然科学部門 教授。<br>
    理化学研究所 数理創造研究センター(iTHEMS) 客員研究員。<br>
    2011年3月に総合研究大学院大学物理科学研究科にて博士(理学)の学位を取得。<br>
    日本原子力研究開発機構、自然科学研究機構核融合科学研究所を経て2024年度より現職。<br>
    乱流プラズマをはじめとする非平衡ダイナミクス全般に関する数理・情報・物理の沼にずーーーーっとハマっています。”Interesting first”の自由悦楽研究主義。<br>

  links:
    - type: general
      url: https://researchmap.jp/moto0607
  timeslot: 8

