- name: 武村 勇輝
  englishName: Yuki Takemura
  position: 助教
  affiliation: 核融合科学研究所
  image: https://lh3.googleusercontent.com/pw/AP1GczPApeYN3PYC7hcnSFIC349Kt7p0AbsmYUNdCWO3HoEGbuuHYQhkVYc0UDZ9lq15ljYHdd4Lf--bDLiSPQCdAMHI48nLgaF245XnQ5pDwUFJoCzzguI=w2400
  description: 自然科学研究機構 核融合科学研究所 可知化センシングユニット。総合研究大学院大学 物理科学研究科 核融合科学専攻にて博士（工学）を取得。博士課程では、世界最大級の超伝導ヘリカル装置である大型ヘリカル装置を対象として、MHD不安定性および磁気島ダイナミクスに関する研究に従事した。現在は、大型ヘリカル装置に加えてトカマク装置も対象とし、装置横断的な視点からMHD不安定性のモデリングに関する研究を進めている。<br>

  links:
    - type: general
      url: https://researchmap.jp/ytakemura
  timeslot: 7

