- name: 笠田 竜太
  englishName: Ryuta Kasada
  position: 教授
  affiliation: 東北大学
  image: https://lh3.googleusercontent.com/pw/AP1GczOkGk_iIzJfNKw3FgTija8WG-ZwcUZ4_7uC6XTKgEboZnecoYgRtCoh6dV7robYbb7eQezkHxiueOyw0mbOrONdEMa5hddIcUgJJzkXqimrLceYa-A=w2400
  description: 京都大学エネルギー理工学研究所助教、准教授を経て、現在は東北大学金属材料研究所教授。専門は原子力・核融合材料、エネルギーシステム工学、科学コミュニケーション。文科省にて核融合研究関連委員、原子力規制委員会にて原子炉安全関連委員を務める。千葉県木更津市出身。<br>

