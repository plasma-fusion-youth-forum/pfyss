name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: 🟨 Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: lint

      - name: 🧹 Execute lint
        run: pixi run -e lint lint

  checks:
    name: Test build on ${{ startsWith(matrix.os, 'macos-') && 'macOS' || startsWith(matrix.os, 'windows-') && 'Windows' || 'Linux' }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: check out repo
        uses: actions/checkout@v5

      - name: 🟨 Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.4

      - name: 🧪 Execute test build
        env:
          pytest_github_report: true
        run: pixi run init && pixi run build
